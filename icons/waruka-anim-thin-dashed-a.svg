<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100" role="img" aria-label="Waruka: a red disc tracks left to right along a gold W, laying a red dashed trail, then rests on the finished icon">
  <title>Waruka — animated (Version A)</title>
  <defs>
    <path id="wp" d="M26 32 L40 71 L50 46 L60 71 L74 32"/>
    <clipPath id="clip">
      <rect x="0" y="0" height="100" width="0">
        <animate attributeName="width" values="0;40;50;60;78;78;78" keyTimes="0;0.165;0.275;0.385;0.55;0.86;1" dur="3.6s" calcMode="linear" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>
  <rect width="100" height="100" rx="24" fill="#1A9E4B"/>
  <path d="M26 32 L40 71 L50 46 L60 71 L74 32" fill="none" stroke="#FDB913" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <g clip-path="url(#clip)">
    <path d="M26 32 L40 71 L50 46 L60 71 L74 32" fill="none" stroke="#CE1126" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 5"/>
    <circle cx="26" cy="32" r="2.6" fill="#CE1126"/>
    <circle cx="40" cy="71" r="2.6" fill="#CE1126"/>
    <circle cx="50" cy="46" r="2.6" fill="#CE1126"/>
    <circle cx="60" cy="71" r="2.6" fill="#CE1126"/>
    <animate attributeName="opacity" values="1;1;1;0" keyTimes="0;0.55;0.86;1" dur="3.6s" repeatCount="indefinite"/>
  </g>
  <circle r="7" fill="#CE1126">
    <animateMotion dur="3.6s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0.3;0.5;0.7;1;1;1" keyTimes="0;0.165;0.275;0.385;0.55;0.86;1">
      <mpath xlink:href="#wp"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;1;0" keyTimes="0;0.55;0.86;1" dur="3.6s" repeatCount="indefinite"/>
  </circle>
</svg>
